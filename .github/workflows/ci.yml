# CI — pull_request & push to main
# Jobs: quality / VP (Oxfmt + Oxlint + tsc) → test / Vitest (vite-plus)

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-vp:
    name: quality / VP — fmt, oxlint, TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for vp / Oxfmt loading vite.config.ts)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: VP check (format + oxlint + typecheck)
        env:
          # Job-level NODE_OPTIONS breaks actions/checkout (Node 20). Scope to vp only.
          NODE_OPTIONS: --experimental-strip-types
        run: bun run check

  test:
    name: test / Vitest (vite-plus)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Heartbeat active hours use local wall clock; default runner is UTC.
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for vp / Vite loading vite.config.ts)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit & integration tests
        env:
          NODE_OPTIONS: --experimental-strip-types
        run: bun run test
