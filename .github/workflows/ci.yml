# CI — pull_request & push to main
# Jobs: quality / VP (Oxfmt + Oxlint + tsc) → test / Vitest (vite-plus)

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-vp:
    name: quality / VP — fmt, oxlint, TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # bunx は vp の shebang で Node を起動し、vite.config.ts を読めない。bun run で Bun 経由にする。
      - name: VP check (format + oxlint + typecheck)
        run: bun run check

  test:
    name: test / Vitest (vite-plus)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Heartbeat active hours use local wall clock; default runner is UTC.
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit & integration tests
        run: bun run test
